<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>SADEE || POS</title>
</head>

<body>

    <div class="container p">
        <input type="button" class="btn btn-dark mt-4 mb-4" data-bs-toggle="modal" data-bs-target="#exampleModal"
            value="Customer Manageing">

        <div class="table-responsive-md">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Mobile</th>
                        <th>E-mail</th>
                        <th>City</th>
                        <th>Address Line 1</th>
                        <th>Address Line 2</th>
                        <th>Gender</th>
                        <th>Status</th>
                        <th>Barcode</th>
                    </tr>
                </thead>
                <tbody id="cus_details_table">
                </tbody>
            </table>
            <h6 class="text-center mb-3 fst-italic fw-lighter">List of customers</h6>
        </div>

    </div>

    <!-- Modal Start-->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Customer Mangement</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-5">
                    <!-- Customer Manage Start -->
                    <div class="container">
                        <div class="row">
                            <div class="col">
                                <div class="row">
                                    <div class="col-6">
                                        <label for="inputPassword4" class="form-label">First Name</label>
                                        <input type="text" class="form-control" placeholder="Sadeesha" id="fname">
                                    </div>
                                    <div class="col-6">
                                        <label for="inputPassword4" class="form-label">Last Name</label>
                                        <input type="text" class="form-control" placeholder="Chathumal" id="lname">
                                    </div>
                                </div>
                                <div class="col-12">
                                    <label for="inputPassword4" class="form-label">Mobile</label>
                                    <input type="text" class="form-control" placeholder="07x x xxx xxx" id="mobile">
                                </div>
                                <div class="col-12">
                                    <label for="inputPassword4" class="form-label">E-mail</label>
                                    <input type="text" class="form-control" placeholder="abc@gmail.com" id="email">
                                </div>
                                <div class="col-12">
                                    <label for="inputPassword4" class="form-label">City</label>
                                    <input type="text" class="form-control" placeholder="Kalutara" id="city">
                                </div>
                                <div class="row">
                                    <div class="col-6">
                                        <label for="inputPassword4" class="form-label">Address Line 1</label>
                                        <input type="text" class="form-control" placeholder="Minikandala"
                                            id="add-line-1">
                                    </div>
                                    <div class="col-6">
                                        <label for="inputPassword4" class="form-label">Address Line 2</label>
                                        <input type="text" class="form-control" placeholder="Pelenda" id="add-line-2">
                                    </div>
                                </div>
                                <div class="col-12">
                                    <label for="inputPassword4" class="form-label">Gender</label>
                                    <select id="gender" class="form-select">
                                        <option selected>Choose...</option>
                                        <option>Male</option>
                                        <option>Female</option>
                                    </select>
                                </div>
                                <div class="row">
                                    <div class="col-6">
                                        <label for="inputPassword4" class="form-label">Status</label>
                                        <select id="status" class="form-select">
                                            <option selected>Choose...</option>
                                            <option>Active</option>
                                            <option>Inactive</option>
                                        </select>
                                    </div>
                                    <div class="col-6">
                                        <label for="inputPassword4" class="form-label">Barcode</label>
                                        <input type="text" class="form-control" placeholder="0012-3456-789"
                                            id="barcode">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Customer Manage End -->
                </div>
                <div class="modal-footer">
                    <input type="button" class="btn btn-secondary" data-bs-dismiss="modal" value="Close">
                    <input type="button" class="btn btn-primary" value="Update">
                    <input type="button" class="btn btn-warning" value="Add" onclick="AddCustomer()">
                </div>
            </div>
        </div>
    </div>
    <!-- Model End -->

    <!-- Nav Botom Start -->
    <nav class="navbar fixed-bottom">
        <div class="container-fluid d-flex justify-content-center align-items-center">
            <ul
                class="nav col-12 col-lg-auto my-2 justify-content-center my-md-0 text-small card shadow border-0 flex-row p-3 rounded-4">
                <li>
                    <a href="index.html" class="text-decoration-none botom-nav-hover">
                        <div class="row text-center">
                            <i class="bi bi-house-fill botom-icon"></i>
                            <span class="botom-nav-text">Home</span>
                        </div>
                    </a>
                </li>
                <li>
                    <a href="customer.html" class="text-decoration-none botom-nav-hover">
                        <div class="row text-center">
                            <i class="bi bi-person-fill-add botom-icon"></i>
                            <span class="botom-nav-text">Customer</span>
                        </div>
                    </a>
                </li>
                <li>
                    <a href="category.html" class="text-decoration-none botom-nav-hover">
                        <div class="row text-center">
                            <i class="bi bi-box-seam-fill botom-icon"></i>
                            <span class="botom-nav-text">Category</span>
                        </div>
                    </a>
                </li>
                <li>
                    <a href="employee.html" class="text-decoration-none botom-nav-hover">
                        <div class="row text-center">
                            <i class="bi bi-person-hearts botom-icon"></i>
                            <span class="botom-nav-text">Employees</span>
                        </div>
                    </a>
                </li>
                <li>
                    <a href="sales.html" class="text-decoration-none botom-nav-hover">
                        <div class="row text-center">
                            <i class="bi bi-rocket-takeoff botom-icon"></i>
                            <span class="botom-nav-text">Sales</span>
                        </div>
                    </a>
                </li>
                <li>
                    <a href="stock.html" class="text-decoration-none botom-nav-hover">
                        <div class="row text-center">
                            <i class="bi bi-database-fill-add botom-icon"></i>
                            <span class="botom-nav-text">Stock</span>
                        </div>
                    </a>
                </li>
                <li>
                    <a href="product.html" class="text-decoration-none botom-nav-hover">
                        <div class="row text-center">
                            <i class="bi bi-tags-fill botom-icon"></i>
                            <span class="botom-nav-text">Product</span>
                        </div>
                    </a>
                </li>
                <li>
                    <a href="brand.html" class="text-decoration-none botom-nav-hover">
                        <div class="row text-center">
                            <i class="bi bi-heart-pulse-fill botom-icon"></i>
                            <span class="botom-nav-text">Brand</span>
                        </div>
                    </a>
                </li>
                <li>
                    <a href="company.html" class="text-decoration-none botom-nav-hover">
                        <div class="row text-center">
                            <i class="bi bi-handbag-fill botom-icon"></i>
                            <span class="botom-nav-text">Company</span>
                        </div>
                    </a>
                </li>
            </ul>
        </div>
    </nav>
    <!-- Nav Botom End -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="app.js"></script>

    <script>
        AOS.init();
